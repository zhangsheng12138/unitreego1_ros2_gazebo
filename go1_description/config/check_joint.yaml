# Go1 机器人关节检查 RViz 配置文件
# 转换自 check_joint.rviz

panels:
  - class: rviz_common/Displays
    help_height: 78
    name: Displays
    property_tree_widget:
      expanded:
        - /Global Options1
        - /RobotModel1
      splitter_ratio: 0.5
    tree_height: 523
  - class: rviz_common/Selection
    name: Selection
  - class: rviz_common/Tool Properties
    expanded:
      - /2D Pose Estimate1
      - /2D Nav Goal1
      - /Publish Point1
    name: Tool Properties
    splitter_ratio: 0.5886790156364441
  - class: rviz_common/Views
    expanded:
      - /Current View1
    name: Views
    splitter_ratio: 0.5
  - class: rviz_common/Time
    name: Time
    sync_mode: 0
    sync_source: ""

preferences:
  prompt_save_on_exit: true

toolbars:
  tool_button_style: 2

