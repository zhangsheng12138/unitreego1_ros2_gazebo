    # 坐标系轴
    - alpha: 1
      class: rviz_default_plugins/Axes
      enabled: false
      length: 1
      name: Axes
      radius: 0.10000000149011612
      reference_frame: <Fixed Frame>
      show_trail: false
      value: false

    # TF 坐标变换
    - class: rviz_default_plugins/TF
      enabled: false
      frame_timeout: 15
      frames:
        all_enabled: true
      marker_alpha: 1
      marker_scale: 1
      name: TF
      show_arrows: true
      show_axes: true
      show_names: true
      tree: {}
      update_interval: 0
      value: false

    # 相机点云 - 面部相机
    - alpha: 1
      autocompute_intensity_bounds: true
      autocompute_value_bounds:
        max_value: 10
        min_value: -10
        value: true
      axis: Z
      channel_name: intensity
      class: rviz_default_plugins/PointCloud2
      color: [255, 255, 255]
      color_transformer: RGB8
      decay_time: 0
      enabled: false
      invert_rainbow: false
      max_color: [255, 255, 255]
      min_color: [0, 0, 0]
      name: PointCloud2
      position_transformer: XYZ
      queue_size: 10
      selectable: true
      size_pixels: 3
      size_m: 0.009999999776482582
      style: Flat Squares
      topic: /cam1/point_cloud_face
      unreliable: false
      use_fixed_frame: true
      use_rainbow: true
      value: false

