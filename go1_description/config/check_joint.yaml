  enabled: true

  global_options:
    background_color: [238, 238, 238]
    default_light: true
    fixed_frame: base
    frame_rate: 30

  name: root
  tools:
    - class: rviz_default_plugins/Interact
      hide_inactive_objects: true
    - class: rviz_default_plugins/MoveCamera
    - class: rviz_default_plugins/Select
    - class: rviz_default_plugins/FocusCamera
    - class: rviz_default_plugins/Measure
    - class: rviz_default_plugins/SetInitialPose
      theta_std_deviation: 0.2617993950843811
      topic: /initialpose
      x_std_deviation: 0.5
      y_std_deviation: 0.5
    - class: rviz_default_plugins/SetGoal
      topic: /move_base_simple/goal
    - class: rviz_default_plugins/PublishPoint
      single_click: true
      topic: /clicked_point
  value: true

  views:
    current:
      class: rviz_default_plugins/Orbit
      distance: 1.0180186033248901
      enable_stereo_rendering:
        stereo_eye_separation: 0.05999999865889549
        stereo_focal_distance: 1
        swap_stereo_eyes: false
        value: false
      field_of_view: 0.7853981852531433
      focal_point:
        x: 0.10819146782159805
        y: 0.02224866859614849
        z: -0.08825916796922684
      focal_shape_fixed_size: false
      focal_shape_size: 0.05000000074505806
      invert_z_axis: false
      name: Current View
      near_clip_distance: 0.009999999776482582
      pitch: 0.3647974133491516
      target_frame: <Fixed Frame>
      yaw: 4.123597621917725
    saved: ~

