    update_rate: 16
    horizontal_fov: 2.094
    image_width: 928
    image_height: 800
    near_clip: 0.1
    far_clip: 5
    min_depth: 0.1
    max_depth: 5.0
  # 足端接触传感器配置
  foot_contact:
