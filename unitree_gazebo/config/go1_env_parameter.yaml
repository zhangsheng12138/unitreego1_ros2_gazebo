# Go1 环境参数配置文件
# 包含除了URDF参数外的其他环境参数

# 机器人配置
robot:
  valid_names: ["go1", "a1"]  # 有效的机器人模型名称
  default_name: "go1"  # 默认机器人模型名称
  default_world: "earth"  # 默认世界文件名称
  publish_frequency: 200.0  # 机器人状态发布频率（Hz）

# 控制器配置
controller:
  names:  # 控制器名称列表
    - "joint_state_broadcaster"
    - "FL_hip_controller"
    - "FL_thigh_controller"
    - "FL_calf_controller"
    - "FR_hip_controller"
    - "FR_thigh_controller"
    - "FR_calf_controller"
    - "RL_hip_controller"
    - "RL_thigh_controller"
    - "RL_calf_controller"
    - "RR_hip_controller"
    - "RR_thigh_controller"
    - "RR_calf_controller"

# PID控制器参数
pid:
  gains:
    p: 10.0  # 比例增益
    i: 0.0   # 积分增益
    d: 1.0   # 微分增益

# 传感器配置
sensors:
  cameras:
    names: ["face", "chin", "left", "right", "rearDown"]  # 深度相机名称
  ultrasound:
    names: ["left", "right", "face"]  # 超声波传感器名称
  foot_contacts:
    names: ["FR", "FL", "RR", "RL"]  # 足端接触传感器名称
  thresholds:
    foot_contact: 0.1  # 足端接触力阈值（N）

# 话题名称配置
topics:
  imu: "trunk_imu"  # IMU话题
  camera:
    color: "color/image_raw"  # 彩色图像话题
    depth: "depth/image_raw"  # 深度图像话题
    points: "depth/points"  # 点云话题
  ultrasound: "data"  # 超声波传感器话题
  foot_contact: "unitree/contact/{foot}_foot_contact/force"  # 足端接触话题
  joint_states: "joint_states"  # 关节状态话题
  controller:
    effort: "go1_effort_controller/commands"  # 力矩控制命令话题
    velocity: "cmd_vel"  # 速度控制命令话题
  force: "apply_force/trunk"  # 外力施加话题

# 启动参数默认值
launch:
  default_params:
    wname: "earth"  # 世界文件名称
    rname: "go1"  # 机器人模型名称
    paused: "true"  # 是否暂停启动
    use_sim_time: "true"  # 是否使用仿真时间
    gui: "true"  # 是否打开GUI
    headless: "false"  # 是否无头模式
    debug: "false"  # 是否调试模式
    user_debug: "false"  # 是否用户调试模式
    num_robots: "1"  # 默认机器人数量

# 环境配置
env:
  timer_interval: 1.0  # 定时器回调间隔（秒）
  node_name: "go1_env_node"  # 环境节点名称

# 移动参数
move:
  frame: "world"  # 坐标系: world 或 robot
  publish_rate: 1000  # 发布频率（Hz）
  initial_position:
    x: 0.0  # 初始x位置（米）
    y: 0.0  # 初始y位置（米）
    z: 0.5  # 初始z位置（米）
  circle:
    radius: 1.5  # 圆形运动半径（米）
    period: 5000.0  # 圆形运动周期（毫秒）
  velocity:
    linear:
      x: 0.02  # x方向线速度（米/秒）
      y: 0.0   # y方向线速度（米/秒）
      z: 0.08  # z方向线速度（米/秒）
    angular:
      x: 0.0  # x方向角速度（弧度/秒）
      y: 0.0  # y方向角速度（弧度/秒）
      z: 0.0  # z方向角速度（弧度/秒）
