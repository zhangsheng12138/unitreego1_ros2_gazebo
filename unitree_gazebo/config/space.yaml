# Space World 配置参数
# 包含太空环境的所有可调整参数

# 物理引擎参数
physics:
  max_step_size: 0.001         # 物理引擎时间步长
  real_time_factor: 1          # 实时因子
  real_time_update_rate: 1000   # 实时更新速率
  gravity: [0, 0, 0]            # 重力加速度（太空环境为0）
  ode:
    solver:
      type: "quick"          # 求解器类型
      iters: 50              # 迭代次数
      sor: 1.3               # 超松弛因子
    constraints:
      cfm: 0.0               # 约束力混合系数
      erp: 0.2               # 误差减少参数
      contact_max_correcting_vel: 10.0  # 最大接触修正速度
      contact_surface_layer: 0.001      # 接触表面层厚度

# 场景设置
scene:
  ambient: [0.4, 0.4, 0.4, 1]  # 环境光
  background: [0.1, 0.1, 0.2, 1]  # 背景颜色（深蓝色，模拟太空）

# 静态障碍物
static_environment:
  static_box:
    pose: [-2, 2, 0.5, 0, 0, 0]  # 障碍物位置和姿态
    size: [1, 1, 1]             # 障碍物尺寸
    material:
      ambient: [0.2, 0.2, 0.2, 1.0]  # 材质环境光
      diffuse: [0.421, 0.225, 0.0, 1.0]  # 材质漫反射
